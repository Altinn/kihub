<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Canvas Background (White) -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- BACKGROUND LANDSCAPE -->
  <g>
    <!-- Left Abstract Mountain -->
    <polygon points="0,150 250,350 0,350" fill="#1E2734" />
    
    <!-- Right Abstract Mountain -->
    <polygon points="800,100 500,350 800,350" fill="#1E2734" />

    <!-- Massive Golden Sun -->
    <circle cx="400" cy="350" r="220" fill="#E59E29" />

    <!-- Coral Red Ground / Horizon -->
    <rect x="0" y="350" width="800" height="250" fill="#F05D61" />
  </g>

  <!-- CLOUDS (Bright Blue) -->
  <g fill="#1A85FF">
    <!-- Left Cloud Cluster -->
    <rect x="60" y="150" width="160" height="40" rx="20" />
    <circle cx="100" cy="140" r="30" />
    <circle cx="160" cy="130" r="45" />

    <!-- Right Cloud Cluster -->
    <rect x="580" y="100" width="180" height="45" rx="22.5" />
    <circle cx="630" cy="85" r="35" />
    <circle cx="700" cy="90" r="45" />
  </g>

  <!-- FOREGROUND: THE SINGLE FRIENDLY AGENT -->
  <g>
    <!-- Agent Body (Large Centered Blob) -->
    <path d="M 230,600 C 230,420 300,380 400,380 C 500,380 570,420 570,600 Z" fill="#1E2734" />

    <!-- Left Arm (Resting gracefully) -->
    <!-- Cream Outline for Arm Separation -->
    <path d="M 270,460 Q 200,520 230,600" fill="none" stroke="#FFE5E0" stroke-width="36" stroke-linecap="round" />
    <!-- Solid Dark Blue Arm -->
    <path d="M 270,460 Q 200,520 230,600" fill="none" stroke="#1E2734" stroke-width="30" stroke-linecap="round" />

    <!-- Right Arm (Waving high) -->
    <!-- Cream Outline for Arm Separation -->
    <path d="M 530,460 Q 620,440 630,320" fill="none" stroke="#FFE5E0" stroke-width="36" stroke-linecap="round" />
    <!-- Solid Dark Blue Arm -->
    <path d="M 530,460 Q 620,440 630,320" fill="none" stroke="#1E2734" stroke-width="30" stroke-linecap="round" />

    <!-- Floating Friendly Head -->
    <rect x="320" y="230" width="160" height="120" rx="45" fill="#1E2734" stroke="#FFE5E0" stroke-width="3" />
    
    <!-- Center Antenna -->
    <line x1="400" y1="230" x2="400" y2="160" stroke="#1E2734" stroke-width="8" stroke-linecap="round" />
    <circle cx="400" cy="160" r="12" fill="#1A85FF" />
    <circle cx="400" cy="160" r="4" fill="#FFFFFF" /> <!-- little shine -->

    <!-- Bright Blue Visor -->
    <rect x="350" y="265" width="100" height="55" rx="20" fill="#1A85FF" />
    
    <!-- Smiling Face Details (White paths) -->
    <!-- Happy left eye ^ -->
    <path d="M 375,285 Q 382,275 390,285" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <!-- Happy right eye ^ -->
    <path d="M 410,285 Q 417,275 425,285" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <!-- Big digital smile -->
    <path d="M 380,295 Q 400,315 420,295" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />

    <!-- Motion Lines for Waving Arm -->
    <path d="M 660,350 Q 680,330 660,310" fill="none" stroke="#1E2734" stroke-width="6" stroke-linecap="round" />
    <path d="M 685,340 Q 700,325 685,310" fill="none" stroke="#1A85FF" stroke-width="6" stroke-linecap="round" />
  </g>

</svg>