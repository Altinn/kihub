<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Canvas Background (White) -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- BACKGROUND LANDSCAPE & SKY -->
  <g>
    <!-- Left Abstract Mountain -->
    <polygon points="-20,150 250,350 -20,350" fill="#1E2734" />
    
    <!-- Right Abstract Mountain -->
    <polygon points="820,100 500,350 820,350" fill="#1E2734" />

    <!-- Massive Golden Sun (Centered) -->
    <circle cx="400" cy="350" r="220" fill="#E59E29" />

    <!-- Coral Red Ground / Horizon -->
    <rect x="0" y="350" width="800" height="250" fill="#F05D61" />
  </g>

  <!-- CLOUDS (Bright Blue) -->
  <g fill="#1A85FF">
    <!-- Top Left Cloud -->
    <rect x="60" y="70" width="160" height="40" rx="20" />
    <circle cx="100" cy="60" r="30" />
    <circle cx="160" cy="50" r="45" />

    <!-- Right Cloud Cluster -->
    <rect x="600" y="90" width="150" height="40" rx="20" />
    <circle cx="640" cy="75" r="35" />
    <circle cx="700" cy="85" r="30" />
  </g>

  <!-- TRAJECTORY LINES (Dashed paths showing tools springing out) -->
  <g stroke="#1E2734" stroke-width="6" stroke-linecap="round" stroke-dasharray="12, 16" opacity="0.3">
    <!-- Left path -->
    <path d="M 340,410 Q 220,380 200,280" fill="none" />
    <!-- Center path -->
    <path d="M 400,410 L 400,260" fill="none" />
    <!-- Right path -->
    <path d="M 460,410 Q 580,380 600,280" fill="none" />
  </g>

  <!-- TOOL 1: THE MAGNIFYING GLASS (Search / Analysis - Left) -->
  <g transform="translate(190, 260) rotate(-25)">
    <!-- Handle -->
    <rect x="-16" y="20" width="32" height="110" rx="16" fill="#1E2734" stroke="#FFE5E0" stroke-width="4" />
    <!-- Handle Grips -->
    <line x1="-8" y1="50" x2="8" y2="50" stroke="#FFE5E0" stroke-width="4" stroke-linecap="round" />
    <line x1="-8" y1="70" x2="8" y2="70" stroke="#FFE5E0" stroke-width="4" stroke-linecap="round" />
    <line x1="-8" y1="90" x2="8" y2="90" stroke="#FFE5E0" stroke-width="4" stroke-linecap="round" />
    
    <!-- Outer Rim -->
    <circle cx="0" cy="-30" r="50" fill="#E59E29" stroke="#FFE5E0" stroke-width="4" />
    <!-- Inner Lens Ring -->
    <circle cx="0" cy="-30" r="36" fill="#FFFFFF" stroke="#FFE5E0" stroke-width="4" />
    <!-- Glass/Glare -->
    <path d="M -20,-50 Q 0,-55 20,-50" fill="none" stroke="#1A85FF" stroke-width="6" stroke-linecap="round" opacity="0.6" />
    <circle cx="-15" cy="-15" r="5" fill="#1A85FF" opacity="0.6" />
  </g>

  <!-- TOOL 2: THE WRENCH (Settings / Engineering - Center) -->
  <g transform="translate(400, 200) rotate(12)">
    <!-- Shaft / Handle -->
    <rect x="-22" y="10" width="44" height="130" rx="22" fill="#1E2734" stroke="#FFE5E0" stroke-width="4" />
    <!-- Inner Handle Cutout -->
    <rect x="-6" y="40" width="12" height="80" rx="6" fill="#FFE5E0" opacity="0.3" />

    <!-- Wrench Head -->
    <path d="M -50,-10 C -50,-50 -25,-75 0,-75 C 25,-75 50,-50 50,-10 L 50,30 C 50,45 40,55 25,55 L -25,55 C -40,55 -50,45 -50,30 Z" fill="#1A85FF" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Wrench Jaw Cutout (Drawn by overlapping cream and the background golden sun color) -->
    <path d="M -20,-80 L -20,5 C -20,16 20,16 20,5 L 20,-80" fill="none" stroke="#FFE5E0" stroke-width="4" stroke-linecap="round" />
    <path d="M -18,-80 L -18,5 C -18,14 18,14 18,5 L 18,-80 Z" fill="#E59E29" />
    
    <!-- Adjustment Gear in the center of the wrench -->
    <circle cx="20" cy="15" r="6" fill="#FFFFFF" />
  </g>

  <!-- FLOATING GEARS (Secondary Tools) -->
  <g>
    <!-- Left Gear -->
    <circle cx="280" cy="160" r="18" fill="none" stroke="#1A85FF" stroke-width="12" stroke-dasharray="8, 6" />
    <circle cx="280" cy="160" r="12" fill="#FFFFFF" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Right Gear -->
    <circle cx="530" cy="130" r="14" fill="none" stroke="#E59E29" stroke-width="10" stroke-dasharray="6, 5" />
    <circle cx="530" cy="130" r="9" fill="#FFFFFF" stroke="#FFE5E0" stroke-width="3" />
  </g>

  <!-- TOOL 3: THE MAGIC WAND (Generative AI / Actions - Right) -->
  <g transform="translate(610, 240) rotate(35)">
    <!-- Shaft / Handle -->
    <rect x="-18" y="0" width="36" height="130" rx="18" fill="#1E2734" stroke="#FFE5E0" stroke-width="4" />
    <!-- Wand Tip / Bulb -->
    <circle cx="0" cy="-20" r="40" fill="#F05D61" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Starburst inside wand tip -->
    <polygon points="0,-45 7,-27 25,-20 7,-13 0,5 -7,-13 -25,-20 -7,-27" fill="#FFFFFF" />
    
    <!-- Magic Sparkles trailing off -->
    <circle cx="-35" cy="-45" r="4" fill="#FFFFFF" />
    <circle cx="25" cy="-55" r="5" fill="#FFFFFF" />
    <circle cx="45" cy="-20" r="3" fill="#FFFFFF" />
  </g>

  <!-- THE TOOL CRATE / DOCK (Center Bottom) -->
  <g>
    <!-- Back / Open Lid of the Crate -->
    <polygon points="260,400 540,400 480,310 320,310" fill="#1E2734" stroke="#FFE5E0" stroke-width="4" stroke-linejoin="round" />
    <rect x="360" y="325" width="80" height="15" rx="7.5" fill="#111827" /> <!-- Lid Handle indent -->

    <!-- Crate Inner Depth (Where tools come from) -->
    <polygon points="250,420 550,420 510,400 290,400" fill="#111827" />
    <path d="M 330,410 L 470,410" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.1" /> <!-- Inner glow -->

    <!-- Front Body of the Crate -->
    <polygon points="230,420 570,420 530,530 270,530" fill="#1E2734" stroke="#FFE5E0" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Tech/Terminal Details on the front panel -->
    <rect x="340" y="450" width="120" height="6" rx="3" fill="#FFFFFF" opacity="0.6" />
    <rect x="340" y="470" width="80" height="6" rx="3" fill="#FFFFFF" opacity="0.3" />
    <rect x="340" y="490" width="50" height="6" rx="3" fill="#FFFFFF" opacity="0.3" />
    
    <!-- Crate Status Lights -->
    <circle cx="290" cy="460" r="6" fill="#F05D61" />
    <circle cx="290" cy="485" r="6" fill="#E59E29" />
    <circle cx="290" cy="510" r="6" fill="#1A85FF" />
    
    <!-- Side Latches / Details -->
    <rect x="525" y="455" width="10" height="40" rx="5" fill="#FFE5E0" opacity="0.3" />
    <rect x="265" y="455" width="10" height="40" rx="5" fill="#FFE5E0" opacity="0.3" />
  </g>

  <!-- AMBIENT FLOATING UI PARTICLES -->
  <g>
    <circle cx="150" cy="480" r="8" fill="#E59E29" />
    <circle cx="650" cy="500" r="10" fill="#1A85FF" />
    <circle cx="120" cy="220" r="5" fill="#FFFFFF" />
    <rect x="680" y="380" width="14" height="14" rx="4" fill="#F05D61" transform="rotate(25, 687, 387)" />
  </g>
</svg>