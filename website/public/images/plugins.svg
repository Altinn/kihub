<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Canvas Background (White) -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- BACKGROUND LANDSCAPE & SKY -->
  <g>
    <!-- Left Abstract Mountain -->
    <polygon points="-20,150 250,350 -20,350" fill="#1E2734" />
    
    <!-- Right Abstract Mountain -->
    <polygon points="820,100 500,350 820,350" fill="#1E2734" />

    <!-- Massive Golden Sun (Centered) -->
    <circle cx="400" cy="350" r="220" fill="#E59E29" />

    <!-- Coral Red Ground / Horizon -->
    <rect x="0" y="350" width="800" height="250" fill="#F05D61" />
  </g>

  <!-- CLOUDS (Bright Blue) -->
  <g fill="#1A85FF">
    <!-- Top Left Cloud -->
    <rect x="60" y="70" width="160" height="40" rx="20" />
    <circle cx="100" cy="60" r="30" />
    <circle cx="160" cy="50" r="45" />

    <!-- Right Cloud Cluster -->
    <rect x="600" y="90" width="150" height="40" rx="20" />
    <circle cx="640" cy="75" r="35" />
    <circle cx="700" cy="85" r="30" />
  </g>

  <!-- THE CORE SYSTEM HUB -->
  <g>
    <!-- Shadow / Depth under the core -->
    <rect x="250" y="195" width="300" height="260" rx="45" fill="#111827" opacity="0.4" />
    
    <!-- Main Core Body -->
    <rect x="250" y="180" width="300" height="260" rx="45" fill="#1E2734" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Sockets / Ports (Cutouts waiting for the plugins) -->
    <!-- Top Sockets (for Coral Plugin) -->
    <rect x="350" y="170" width="35" height="25" rx="8" fill="#111827" stroke="#FFE5E0" stroke-width="3" />
    <rect x="415" y="170" width="35" height="25" rx="8" fill="#111827" stroke="#FFE5E0" stroke-width="3" />
    
    <!-- Right Sockets (for Golden Plugin) -->
    <rect x="535" y="250" width="25" height="35" rx="8" fill="#111827" stroke="#FFE5E0" stroke-width="3" />
    <rect x="535" y="330" width="25" height="35" rx="8" fill="#111827" stroke="#FFE5E0" stroke-width="3" />

    <!-- Core Internal Hub Details -->
    <rect x="280" y="210" width="240" height="200" rx="30" fill="#FFFFFF" opacity="0.05" />
    <!-- Hub Node Emblem -->
    <circle cx="400" cy="310" r="45" fill="none" stroke="#FFE5E0" stroke-width="6" opacity="0.3" />
    <circle cx="400" cy="310" r="20" fill="#FFE5E0" opacity="0.3" />
    <line x1="400" y1="240" x2="400" y2="265" stroke="#FFE5E0" stroke-width="6" opacity="0.3" stroke-linecap="round" />
    <line x1="400" y1="355" x2="400" y2="380" stroke="#FFE5E0" stroke-width="6" opacity="0.3" stroke-linecap="round" />
    <line x1="330" y1="310" x2="355" y2="310" stroke="#FFE5E0" stroke-width="6" opacity="0.3" stroke-linecap="round" />
    <line x1="445" y1="310" x2="470" y2="310" stroke="#FFE5E0" stroke-width="6" opacity="0.3" stroke-linecap="round" />
  </g>

  <!-- PLUGIN 1: INSTALLED (Left - Bright Blue) -->
  <g>
    <!-- Plugin Body (Overlapping core border slightly to look perfectly flush) -->
    <rect x="130" y="240" width="125" height="140" rx="30" fill="#1A85FF" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Database/Storage Icon -->
    <rect x="172" y="280" width="40" height="14" rx="5" fill="#FFFFFF" />
    <rect x="172" y="304" width="40" height="14" rx="5" fill="#FFFFFF" />
    <rect x="172" y="328" width="40" height="14" rx="5" fill="#FFFFFF" />
    
    <!-- Connection Success Sparkles -->
    <path d="M 265,220 Q 280,230 265,240" fill="none" stroke="#1A85FF" stroke-width="5" stroke-linecap="round" />
    <path d="M 265,400 Q 280,390 265,380" fill="none" stroke="#1A85FF" stroke-width="5" stroke-linecap="round" />
    <circle cx="240" cy="260" r="4" fill="#FFFFFF" />
  </g>

  <!-- PLUGIN 2: INSTALLING (Top - Coral Red) -->
  <g>
    <!-- Motion Lines indicating downward sliding -->
    <line x1="367" y1="-10" x2="367" y2="20" stroke="#F05D61" stroke-width="6" stroke-linecap="round" stroke-dasharray="10, 10" opacity="0.6" />
    <line x1="432" y1="-10" x2="432" y2="20" stroke="#F05D61" stroke-width="6" stroke-linecap="round" stroke-dasharray="10, 10" opacity="0.6" />

    <!-- Prongs (Drawn first to sit "behind" the body) -->
    <rect x="350" y="120" width="35" height="40" rx="8" fill="#F05D61" stroke="#FFE5E0" stroke-width="4" />
    <rect x="415" y="120" width="35" height="40" rx="8" fill="#F05D61" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Plugin Body -->
    <rect x="320" y="40" width="160" height="90" rx="30" fill="#F05D61" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Lightning Bolt Icon (Action Plugin) -->
    <polygon points="405,60 390,85 400,85 395,110 410,80 400,80" fill="#FFFFFF" />
  </g>

  <!-- PLUGIN 3: INSTALLING (Right - Golden) -->
  <g>
    <!-- Motion Lines indicating leftward sliding -->
    <line x1="770" y1="267" x2="800" y2="267" stroke="#E59E29" stroke-width="6" stroke-linecap="round" stroke-dasharray="10, 10" opacity="0.6" />
    <line x1="770" y1="347" x2="800" y2="347" stroke="#E59E29" stroke-width="6" stroke-linecap="round" stroke-dasharray="10, 10" opacity="0.6" />

    <!-- Prongs -->
    <rect x="585" y="250" width="40" height="35" rx="8" fill="#E59E29" stroke="#FFE5E0" stroke-width="4" />
    <rect x="585" y="330" width="40" height="35" rx="8" fill="#E59E29" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Plugin Body -->
    <rect x="615" y="210" width="130" height="190" rx="35" fill="#E59E29" stroke="#FFE5E0" stroke-width="4" />
    
    <!-- Plus / Add-on Icon -->
    <path d="M 660,305 L 700,305 M 680,285 L 680,325" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- AMBIENT FLOATING PARTICLES (Adding UI depth and motion) -->
  <g>
    <circle cx="100" cy="180" r="8" fill="#E59E29" />
    <circle cx="680" cy="120" r="12" fill="#F05D61" />
    <circle cx="150" cy="460" r="6" fill="#FFFFFF" />
    <rect x="700" y="450" width="16" height="16" rx="4" fill="#1A85FF" transform="rotate(15, 708, 458)" />
    <polygon points="120,480 135,455 150,480" fill="#E59E29" transform="rotate(-10, 135, 470)" />
  </g>
</svg>