<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Canvas Background (White) -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- BACKGROUND LANDSCAPE & SKY -->
  <g>
    <!-- Left Abstract Mountain -->
    <polygon points="-20,150 250,350 -20,350" fill="#1E2734" />
    
    <!-- Right Abstract Mountain -->
    <polygon points="820,100 500,350 820,350" fill="#1E2734" />

    <!-- Massive Golden Sun (Centered) -->
    <circle cx="400" cy="350" r="220" fill="#E59E29" />

    <!-- Coral Red Ground / Horizon -->
    <rect x="0" y="350" width="800" height="250" fill="#F05D61" />
  </g>

  <!-- CLOUDS (Bright Blue) -->
  <g fill="#1A85FF">
    <!-- Top Left Cloud -->
    <rect x="60" y="70" width="160" height="40" rx="20" />
    <circle cx="100" cy="60" r="30" />
    <circle cx="160" cy="50" r="45" />

    <!-- Right Cloud Cluster -->
    <rect x="600" y="90" width="150" height="40" rx="20" />
    <circle cx="640" cy="75" r="35" />
    <circle cx="700" cy="85" r="30" />
  </g>

  <!-- HOLOGRAPHIC PROJECTION (Light cone from the book) -->
  <g>
    <!-- Background projection cone -->
    <polygon points="380,420 420,420 520,150 280,150" fill="#1A85FF" opacity="0.08" />
    <!-- Projection Rings -->
    <ellipse cx="400" cy="300" rx="65" ry="16" fill="none" stroke="#1A85FF" stroke-width="4" opacity="0.3" />
    <ellipse cx="400" cy="210" rx="100" ry="22" fill="none" stroke="#1A85FF" stroke-width="4" opacity="0.2" />
  </g>

  <!-- THE HOLOGRAPHIC AI LIGHTBULB (Network Graph Idea) -->
  <g>
    <!-- Outer Bulb Shape (Dashed) -->
    <path d="M 345,160 C 345,95 455,95 455,160 C 455,200 425,225 425,255 L 375,255 C 375,225 345,200 345,160 Z" fill="#E59E29" opacity="0.1" />
    <path d="M 345,160 C 345,95 455,95 455,160 C 455,200 425,225 425,255 L 375,255 C 375,225 345,200 345,160 Z" fill="none" stroke="#E59E29" stroke-width="4" stroke-dasharray="8, 8" stroke-linecap="round" />
    
    <!-- Metal Base of Bulb -->
    <rect x="382" y="260" width="36" height="8" rx="4" fill="#1E2734" />
    <rect x="386" y="272" width="28" height="6" rx="3" fill="#1E2734" />
    <path d="M 395,282 L 405,282 L 400,290 Z" fill="#1E2734" />

    <!-- Internal Network Graph (Filament) -->
    <!-- Edges -->
    <line x1="400" y1="130" x2="365" y2="175" stroke="#1E2734" stroke-width="4" stroke-linecap="round" />
    <line x1="400" y1="130" x2="435" y2="175" stroke="#1E2734" stroke-width="4" stroke-linecap="round" />
    <line x1="365" y1="175" x2="400" y2="215" stroke="#1E2734" stroke-width="4" stroke-linecap="round" />
    <line x1="435" y1="175" x2="400" y2="215" stroke="#1E2734" stroke-width="4" stroke-linecap="round" />
    <line x1="400" y1="215" x2="400" y2="255" stroke="#1E2734" stroke-width="4" stroke-linecap="round" />
    
    <!-- Nodes -->
    <circle cx="400" cy="130" r="14" fill="#1A85FF" stroke="#FFFFFF" stroke-width="4" />
    <circle cx="365" cy="175" r="10" fill="#F05D61" stroke="#FFFFFF" stroke-width="3" />
    <circle cx="435" cy="175" r="10" fill="#E59E29" stroke="#FFFFFF" stroke-width="3" />
    <circle cx="400" cy="215" r="12" fill="#1E2734" stroke="#FFFFFF" stroke-width="4" />
  </g>

  <!-- THE MASSIVE OPEN BOOK -->
  <g>
    <!-- Dark Blue Cover (Backing) -->
    <path d="M 400,540 Q 250,570 100,490 L 100,280 Q 250,360 400,330 Q 550,360 700,280 L 700,490 Q 550,570 400,540 Z" fill="#1E2734" stroke="#FFE5E0" stroke-width="6" stroke-linejoin="round" />

    <!-- Left Page Group (With 3D Edge Thickness) -->
    <g stroke="#1E2734" stroke-width="4" stroke-linejoin="round">
      <!-- Page Edge / Thickness -->
      <path d="M 120,455 L 120,480 Q 260,555 400,525 L 400,500 Q 260,530 120,455 Z" fill="#FFE5E0" />
      <!-- Top Page Surface -->
      <path d="M 400,500 Q 260,530 120,455 L 120,290 Q 260,370 400,340 Z" fill="#FFFFFF" />
    </g>

    <!-- Right Page Group (With 3D Edge Thickness) -->
    <g stroke="#1E2734" stroke-width="4" stroke-linejoin="round">
      <!-- Page Edge / Thickness -->
      <path d="M 680,455 L 680,480 Q 540,555 400,525 L 400,500 Q 540,530 680,455 Z" fill="#FFE5E0" />
      <!-- Top Page Surface -->
      <path d="M 400,500 Q 540,530 680,455 L 680,290 Q 540,370 400,340 Z" fill="#FFFFFF" />
    </g>

    <!-- Center Spine Crease -->
    <line x1="400" y1="340" x2="400" y2="500" stroke="#1E2734" stroke-width="6" stroke-linecap="round" />

    <!-- THE BOOKMARK (Hanging from the bottom spine) -->
    <path d="M 385,510 L 415,510 L 415,585 L 400,565 L 385,585 Z" fill="#F05D61" stroke="#1E2734" stroke-width="4" stroke-linejoin="round" />

    <!-- LEFT PAGE CONTENT (Documentation / Diagrams) -->
    <!-- Text Lines -->
    <path d="M 180,350 Q 260,390 340,360" fill="none" stroke="#1E2734" stroke-width="6" stroke-linecap="round" opacity="0.15" />
    <path d="M 180,375 Q 260,415 340,385" fill="none" stroke="#1E2734" stroke-width="6" stroke-linecap="round" opacity="0.15" />
    <path d="M 180,400 Q 220,420 260,405" fill="none" stroke="#1E2734" stroke-width="6" stroke-linecap="round" opacity="0.15" />
    <!-- Diagram Graphic -->
    <circle cx="210" cy="425" r="16" fill="#E59E29" />
    <path d="M 235,435 Q 265,450 295,435" fill="none" stroke="#1A85FF" stroke-width="8" stroke-linecap="round" />

    <!-- RIGHT PAGE CONTENT (Dark Mode Code Block) -->
    <g>
      <!-- Code Block Background -->
      <path d="M 460,360 Q 540,385 620,345 L 620,430 Q 540,470 460,445 Z" fill="#1E2734" stroke="#1E2734" stroke-width="2" stroke-linejoin="round" />
      <!-- Terminal UI Buttons -->
      <circle cx="480" cy="385" r="4" fill="#F05D61" />
      <circle cx="495" cy="388" r="4" fill="#E59E29" />
      <circle cx="510" cy="391" r="4" fill="#1A85FF" />
      <!-- Stylized Code Syntax -->
      <path d="M 480,410 Q 510,420 540,410" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
      <path d="M 480,425 Q 510,435 570,420" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
      <path d="M 550,408 Q 570,413 590,405" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" />
    </g>

    <!-- PROJECTION LENS ORIGIN (Inside the book) -->
    <ellipse cx="400" cy="430" rx="30" ry="10" fill="#1A85FF" opacity="0.4" />
    <ellipse cx="400" cy="430" rx="14" ry="4" fill="#FFFFFF" />
  </g>

  <!-- AMBIENT FLOATING KNOWLEDGE PARTICLES -->
  <g>
    <!-- Left floaters -->
    <rect x="180" y="150" width="16" height="16" rx="4" fill="#F05D61" transform="rotate(15, 188, 158)" />
    <circle cx="240" cy="110" r="8" fill="#1A85FF" />
    <path d="M 210,230 L 220,230 M 215,225 L 215,235" stroke="#E59E29" stroke-width="4" stroke-linecap="round" />
    
    <!-- Right floaters -->
    <polygon points="620,160 635,135 650,160" fill="#1A85FF" transform="rotate(-15, 635, 150)" />
    <circle cx="580" cy="120" r="10" fill="#E59E29" />
    <path d="M 570,250 L 580,250 M 575,245 L 575,255" stroke="#F05D61" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>